services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: noclunetwork:latest
    restart: unless-stopped
    ports:
      # Host port 3000, fronted by Caddy on the shared droplet.
      - "3000:3000"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SERVICE_TOKEN: ${SERVICE_TOKEN}
      NOCLULABS_BASE_URL: ${NOCLULABS_BASE_URL:-}
      NOCLULABS_SERVICE_TOKEN: ${NOCLULABS_SERVICE_TOKEN:-}
