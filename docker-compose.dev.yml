services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: noclu
      POSTGRES_PASSWORD: noclu
      POSTGRES_DB: noclunetwork
    ports:
      # Host port 5439 to avoid clashing with other local Postgres instances
      # (5432 default, 5433 noclulabs.com dev). The container port stays 5432.
      - "5439:5432"
    volumes:
      # Postgres 18 stores data under a major-version subdirectory, so the volume
      # mounts at /var/lib/postgresql, not /var/lib/postgresql/data (the 18+ image
      # rejects a mount at the old data path). See docker-library/postgres#1259.
      - noclunetwork_pgdata:/var/lib/postgresql

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - noclunetwork_redisdata:/data

volumes:
  noclunetwork_pgdata:
  noclunetwork_redisdata:
